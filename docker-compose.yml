version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       careagent_db
      POSTGRES_USER:     careagent
      POSTGRES_PASSWORD: careagent123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careagent -d careagent_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://careagent:careagent123@postgres:5432/careagent_db
      REDIS_URL:    redis://redis:6379
      CHROMA_DB_PATH: /app/chroma_medical_kb
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_medical_kb
    command: >
      sh -c "python scripts/init_db.py &&
             python utils/knowledge_base.py &&
             uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
